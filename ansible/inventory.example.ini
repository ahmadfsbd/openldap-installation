[openldap]
openldap-1 ansible_host=<private-ip-1>
openldap-2 ansible_host=<private-ip-2>
# Add more hosts when terraform instance_count is higher:
# openldap-3 ansible_host=<private-ip-3>
# openldap-4 ansible_host=<private-ip-4>

[openldap:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_rsa
# The first host is the writable provider. Every other openldap host is a read
# replica / consumer.
ldap_provider_host=openldap-1
